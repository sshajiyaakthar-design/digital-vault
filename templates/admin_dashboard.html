{% extends "base.html" %}
{% block content %}
<div class="fade-in">
  <div class="d-flex align-items-start justify-content-between gap-3 flex-wrap mb-3">
    <div>
      <h1 class="h3 fw-bold mb-1"><i class="bi bi-shield-lock me-2"></i>Admin Dashboard</h1>
      <div class="muted">Monitor users and capsules.</div>
    </div>
    <div class="text-end">
      <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('admin.users') }}"><i class="bi bi-people me-1"></i>Users</a>
      <a class="btn btn-outline-secondary btn-sm ms-2" href="{{ url_for('admin.capsules') }}"><i class="bi bi-collection me-1"></i>Capsules</a>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-12 col-md-4">
      <div class="card p-3 h-100">
        <div class="muted small">Total users</div>
        <div class="display-6 fw-bold">{{ total_users }}</div>
      </div>
    </div>
    <div class="col-12 col-md-4">
      <div class="card p-3 h-100">
        <div class="muted small">Total capsules</div>
        <div class="display-6 fw-bold">{{ total_capsules }}</div>
      </div>
    </div>
    <div class="col-12 col-md-4">
      <div class="card p-3 h-100">
        <div class="muted small">Opened capsules</div>
        <div class="display-6 fw-bold">{{ opened_count }}</div>
      </div>
    </div>
  </div>

  <div class="row g-3 mt-1">
    <div class="col-12 col-md-6">
      <div class="card p-3 h-100">
        <div class="muted small"><i class="bi bi-lock me-1"></i>Locked</div>
        <div class="display-6 fw-bold">{{ locked_count }}</div>
      </div>
    </div>
    <div class="col-12 col-md-6">
      <div class="card p-3 h-100">
        <div class="muted small"><i class="bi bi-unlock me-1"></i>Unlocked (not opened yet)</div>
        <div class="display-6 fw-bold">{{ unlocked_count }}</div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
